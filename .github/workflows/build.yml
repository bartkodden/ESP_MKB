name: Build ESP32 Firmware & Windows App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ============================================
  # ESP32 Firmware Build
  # ============================================
  build-firmware:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.4.1
        target: esp32
        path: 'firmware'
    
    - name: First Configure - Download Managed Components
      working-directory: firmware
      run: |
        . $IDF_PATH/export.sh
        echo "📦 First configure: downloading managed components..."
        idf.py reconfigure || true
    
    - name: Verify Managed Components Downloaded
      working-directory: firmware
      run: |
        echo "🔍 Checking if Arduino component exists..."
        if [ -f "managed_components/espressif__arduino-esp32/cores/esp32/esp32-hal-i2c-slave.c" ]; then
          echo "✅ Arduino component found!"
        else
          echo "❌ Arduino component NOT found!"
          ls -la managed_components/
          exit 1
        fi
    
    - name: Apply Patches Manually
      working-directory: firmware
      run: |
        echo "🔧 Applying Arduino I2C patch manually..."
        ARDUINO_FILE="managed_components/espressif__arduino-esp32/cores/esp32/esp32-hal-i2c-slave.c"
        
        # Check if already patched
        if grep -q "Function doesn't exist in ESP-IDF 5.4.1" "$ARDUINO_FILE"; then
          echo "✅ Already patched!"
        else
          echo "Patching $ARDUINO_FILE..."
          
          # Create backup
          cp "$ARDUINO_FILE" "$ARDUINO_FILE.bak"
          
          # Apply patch using sed
          sed -i 's|^  i2c_ll_slave_set_fifo_mode(i2c->dev, true);|  // i2c_ll_slave_set_fifo_mode(i2c->dev, true);  // Function doesn'"'"'t exist in ESP-IDF 5.4.1\n  i2c_ll_enable_fifo_mode(i2c->dev, true);|' "$ARDUINO_FILE"
          sed -i 's|^  i2c_ll_set_mode(i2c->dev, I2C_BUS_MODE_SLAVE);|  // i2c_ll_set_mode(i2c->dev, I2C_BUS_MODE_SLAVE);|' "$ARDUINO_FILE"
          sed -i 's|^  i2c_ll_enable_pins_open_drain(i2c->dev, true);|  // i2c_ll_enable_pins_open_drain(i2c->dev, true);|' "$ARDUINO_FILE"
          
          echo "✅ Patch applied!"
          
          # Verify
          echo "Verification - checking for patched content:"
          grep -A 1 "i2c_ll_enable_fifo_mode" "$ARDUINO_FILE" || echo "WARNING: Patch may have failed"
        fi
    
    - name: Build Firmware
      working-directory: firmware
      run: |
        . $IDF_PATH/export.sh
        echo "🏗️ Building firmware..."
        idf.py build
    
    - name: Generate Build Info
      working-directory: firmware/build
      run: |
        echo "# ESP32 Firmware Build" > build-info.txt
        echo "Build Date: $(date)" >> build-info.txt
        echo "Commit: ${{ github.sha }}" >> build-info.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info.txt
        echo "" >> build-info.txt
        echo "## Binary Files:" >> build-info.txt
        ls -lh *.bin >> build-info.txt
        echo "" >> build-info.txt
        echo "## Checksums:" >> build-info.txt
        sha256sum *.bin | tee firmware-checksums.txt
    
    - name: Upload Firmware Binaries
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware-${{ github.sha }}
        path: |
          firmware/build/*.bin
          firmware/build/bootloader/bootloader.bin
          firmware/build/partition_table/partition-table.bin
          firmware/build/build-info.txt
          firmware/build/firmware-checksums.txt
        retention-days: 30
    
    - name: Upload Flash Instructions
      uses: actions/upload-artifact@v4
      with:
        name: flash-instructions-${{ github.sha }}
        path: firmware/build/flasher_args.json
        retention-days: 30

  # ============================================
  # Windows App Build
  # ============================================
  build-windows-app:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Windows SDK 10.0.19041.0
      shell: pwsh
      run: |
        Write-Host "Installing Windows 10 SDK 10.0.19041..."
        choco install windows-sdk-10.0 --version=10.0.19041.0 --no-progress -y
    
    - name: Display .NET Info
      run: dotnet --info
    
    - name: List Available Windows SDKs
      shell: pwsh
      run: |
        Write-Host "Checking installed Windows SDKs..."
        if (Test-Path "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP") {
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP"
        } else {
          Write-Host "UAP folder not found"
        }
    
    - name: Restore Dependencies
      working-directory: app/win
      run: dotnet restore
    
    - name: Build Release
      working-directory: app/win
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Self-Contained (Windows x64)
      working-directory: app/win
      run: |
        dotnet publish --configuration Release --runtime win-x64 --self-contained true --output ../../publish/win-x64
    
    - name: Publish Framework-Dependent
      working-directory: app/win
      run: |
        dotnet publish --configuration Release --output ../../publish/framework-dependent
    
    - name: Create Build Info
      shell: pwsh
      run: |
        @"
        # Windows MCS Server Build
        Build Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}
        "@ | Out-File -FilePath publish/BUILD-INFO.txt -Encoding UTF8
    
    - name: Upload Self-Contained Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app-standalone-${{ github.sha }}
        path: publish/win-x64/**/*
        retention-days: 30
    
    - name: Upload Framework-Dependent Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app-portable-${{ github.sha }}
        path: publish/framework-dependent/**/*
        retention-days: 30

  # ============================================
  # Create GitHub Release (on tags only)
  # ============================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-firmware, build-windows-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Firmware
      uses: actions/download-artifact@v4
      with:
        name: esp32-firmware-${{ github.sha }}
        path: release/firmware
    
    - name: Download Flash Instructions
      uses: actions/download-artifact@v4
      with:
        name: flash-instructions-${{ github.sha }}
        path: release/firmware
    
    - name: Download Windows App (Standalone)
      uses: actions/download-artifact@v4
      with:
        name: windows-app-standalone-${{ github.sha }}
        path: release/windows-standalone
    
    - name: Download Windows App (Portable)
      uses: actions/download-artifact@v4
      with:
        name: windows-app-portable-${{ github.sha }}
        path: release/windows-portable
    
    - name: Create ZIP Archives
      run: |
        cd release/firmware
        zip -r ../ESP32-Firmware-${{ github.ref_name }}.zip .
        cd ../windows-standalone
        zip -r ../Windows-App-Standalone-${{ github.ref_name }}.zip .
        cd ../windows-portable
        zip -r ../Windows-App-Portable-${{ github.ref_name }}.zip .
        cd ../..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.zip
          release/firmware/*.bin
          release/firmware/build-info.txt
          release/firmware/firmware-checksums.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}