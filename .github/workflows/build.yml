name: Build ESP32 Firmware & Windows App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ============================================
  # ESP32 Firmware Build
  # ============================================
  build-firmware:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
    
    - name: Login to Docker Hub (optional, helps avoid rate limits)
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      continue-on-error: true
    
    - name: Setup ESP-IDF and Build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.4.3
        target: esp32
        path: 'firmware'
    
    # ← REMOVED "Build Firmware" step - the action above already built it!
    
    - name: Generate Build Info
      working-directory: firmware/build
      run: |
        echo "# ESP32 Firmware Build" > build-info.txt
        echo "Build Date: $(date)" >> build-info.txt
        echo "Commit: ${{ github.sha }}" >> build-info.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info.txt
        echo "" >> build-info.txt
        echo "## Binary Files:" >> build-info.txt
        ls -lh *.bin >> build-info.txt
        echo "" >> build-info.txt
        echo "## Checksums:" >> build-info.txt
        sha256sum *.bin | tee firmware-checksums.txt
    
    - name: Upload Firmware Binaries
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware-${{ github.sha }}
        path: |
          firmware/build/*.bin
          firmware/build/bootloader/bootloader.bin
          firmware/build/partition_table/partition-table.bin
          firmware/build/build-info.txt
          firmware/build/firmware-checksums.txt
        retention-days: 30
    
    - name: Upload Flash Instructions
      uses: actions/upload-artifact@v4
      with:
        name: flash-instructions-${{ github.sha }}
        path: firmware/build/flasher_args.json
        retention-days: 30

  # ============================================
  # Windows App Build
  # ============================================
  build-windows-app:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Install Windows SDK with UWP Components
      shell: pwsh
      run: |
        Write-Host "Installing Visual Studio Build Tools with UWP workload..."
        
        # Download Visual Studio Build Tools installer
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile "$env:TEMP\vs_buildtools.exe"
        
        # Install with UWP workload (includes UAP platform files)
        Start-Process -Wait -FilePath "$env:TEMP\vs_buildtools.exe" -ArgumentList `
          "--quiet", `
          "--wait", `
          "--norestart", `
          "--nocache", `
          "--add", "Microsoft.VisualStudio.Workload.UniversalBuildTools", `
          "--add", "Microsoft.VisualStudio.Component.Windows10SDK.19041"
        
        Write-Host "Installation complete!"
    
    - name: Verify UAP Platform Files
      shell: pwsh
      run: |
        Write-Host "Checking for UAP platform files..."
        $uapPath = "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP\10.0.19041.0"
        if (Test-Path "$uapPath\Platform.xml") {
          Write-Host "✅ UAP Platform.xml found at $uapPath"
        } else {
          Write-Host "❌ UAP Platform.xml not found"
          Write-Host "Available SDK versions:"
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP" -ErrorAction SilentlyContinue
        }
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Display .NET Info
      run: dotnet --info
    
    - name: Restore Dependencies
      working-directory: app/win
      run: dotnet restore
    
    - name: Build Release
      working-directory: app/win
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Self-Contained (Windows x64)
      working-directory: app/win
      run: |
        dotnet publish --configuration Release --runtime win-x64 --self-contained true --output ../../publish/win-x64
    
    - name: Publish Framework-Dependent
      working-directory: app/win
      run: |
        dotnet publish --configuration Release --output ../../publish/framework-dependent
    
    - name: Create Build Info
      shell: pwsh
      run: |
        @"
        # Windows MCS Server Build
        Build Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}
        "@ | Out-File -FilePath publish/BUILD-INFO.txt -Encoding UTF8
    
    - name: Upload Self-Contained Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app-standalone-${{ github.sha }}
        path: publish/win-x64/**/*
        retention-days: 30
    
    - name: Upload Framework-Dependent Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app-portable-${{ github.sha }}
        path: publish/framework-dependent/**/*
        retention-days: 30

  # ============================================
  # Create GitHub Release (on tags only)
  # ============================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-firmware, build-windows-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Firmware
      uses: actions/download-artifact@v4
      with:
        name: esp32-firmware-${{ github.sha }}
        path: release/firmware
    
    - name: Download Flash Instructions
      uses: actions/download-artifact@v4
      with:
        name: flash-instructions-${{ github.sha }}
        path: release/firmware
    
    - name: Download Windows App (Standalone)
      uses: actions/download-artifact@v4
      with:
        name: windows-app-standalone-${{ github.sha }}
        path: release/windows-standalone
    
    - name: Download Windows App (Portable)
      uses: actions/download-artifact@v4
      with:
        name: windows-app-portable-${{ github.sha }}
        path: release/windows-portable
    
    - name: Create ZIP Archives
      run: |
        cd release/firmware
        zip -r ../ESP32-Firmware-${{ github.ref_name }}.zip .
        cd ../windows-standalone
        zip -r ../Windows-App-Standalone-${{ github.ref_name }}.zip .
        cd ../windows-portable
        zip -r ../Windows-App-Portable-${{ github.ref_name }}.zip .
        cd ../..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.zip
          release/firmware/*.bin
          release/firmware/build-info.txt
          release/firmware/firmware-checksums.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}